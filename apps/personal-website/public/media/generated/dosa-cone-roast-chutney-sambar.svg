<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cone roast dosa with chutney and sambar</title>
  <desc id="desc">A stylized illustration of a cone-shaped paper roast dosa served on a steel plate with coconut chutney, tomato chutney, and sambar.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff8ec"/>
      <stop offset="100%" stop-color="#f8e4c2"/>
    </linearGradient>
    <radialGradient id="plate" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#f5f8fb"/>
      <stop offset="65%" stop-color="#d7e0e8"/>
      <stop offset="100%" stop-color="#aab6c2"/>
    </radialGradient>
    <linearGradient id="dosa" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f6d98e"/>
      <stop offset="55%" stop-color="#deaf4f"/>
      <stop offset="100%" stop-color="#a56a20"/>
    </linearGradient>
    <linearGradient id="dosaShadow" x1="0" x2="1">
      <stop offset="0%" stop-color="#6f4213" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#6f4213" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="coconut" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#fbfcfb"/>
      <stop offset="100%" stop-color="#dce4d6"/>
    </radialGradient>
    <radialGradient id="tomato" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#ff8b6f"/>
      <stop offset="100%" stop-color="#c53d2f"/>
    </radialGradient>
    <radialGradient id="sambar" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#c37a32"/>
      <stop offset="100%" stop-color="#8a4619"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#9c6a29" flood-opacity=".18"/>
    </filter>
    <filter id="smallShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity=".16"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <g opacity=".18">
    <circle cx="160" cy="160" r="110" fill="#f2b84b"/>
    <circle cx="1430" cy="160" r="90" fill="#d45e3e"/>
    <circle cx="1480" cy="860" r="130" fill="#8a5cf6"/>
    <circle cx="180" cy="860" r="150" fill="#5ab0ef"/>
  </g>

  <ellipse cx="820" cy="840" rx="530" ry="110" fill="#b18440" opacity=".14"/>

  <g filter="url(#softShadow)">
    <ellipse cx="820" cy="760" rx="520" ry="115" fill="url(#plate)"/>
    <ellipse cx="820" cy="760" rx="456" ry="84" fill="#f9fbfd" opacity=".9"/>
  </g>

  <g transform="translate(0 8)">
    <path d="M757 260 L1076 714 Q1088 732 1077 744 L796 778 Q764 782 746 756 L578 520 Q560 494 579 476 Z" fill="url(#dosa)" filter="url(#smallShadow)"/>
    <path d="M757 260 L1076 714 Q1088 732 1077 744 L796 778" fill="none" stroke="#f9eac1" stroke-width="12" stroke-linecap="round"/>
    <path d="M748 274 L1010 704" fill="none" stroke="#8b5418" stroke-width="8" opacity=".34"/>
    <path d="M739 290 L950 694" fill="none" stroke="#8b5418" stroke-width="5" opacity=".22"/>
    <path d="M792 778 Q935 712 1068 728 Q950 772 796 778 Z" fill="url(#dosaShadow)"/>
    <path d="M739 286 Q754 304 758 320 Q727 318 708 338 Q719 302 739 286 Z" fill="#f8e7bf" opacity=".92"/>
    <path d="M636 520 Q682 497 724 490 Q714 538 730 577 Q681 566 636 520 Z" fill="#d79b38" opacity=".28"/>
    <path d="M598 532 Q633 560 667 575" fill="none" stroke="#825118" stroke-width="7" stroke-linecap="round" opacity=".22"/>
  </g>

  <g transform="translate(0 6)">
    <ellipse cx="1010" cy="808" rx="108" ry="32" fill="#8a6232" opacity=".18"/>
    <ellipse cx="1248" cy="800" rx="108" ry="32" fill="#8a6232" opacity=".18"/>
    <ellipse cx="1372" cy="700" rx="108" ry="32" fill="#8a6232" opacity=".18"/>

    <g filter="url(#smallShadow)">
      <ellipse cx="1010" cy="772" rx="104" ry="82" fill="#dfe7ee"/>
      <ellipse cx="1010" cy="772" rx="86" ry="64" fill="url(#coconut)"/>
      <circle cx="980" cy="750" r="10" fill="#7ab050"/>
      <circle cx="1004" cy="735" r="9" fill="#7ab050"/>
      <circle cx="1034" cy="752" r="8" fill="#7ab050"/>
    </g>

    <g filter="url(#smallShadow)">
      <ellipse cx="1248" cy="762" rx="104" ry="82" fill="#dfe7ee"/>
      <ellipse cx="1248" cy="762" rx="86" ry="64" fill="url(#tomato)"/>
      <path d="M1190 760 Q1240 718 1305 740" fill="none" stroke="#ffb199" stroke-width="10" stroke-linecap="round" opacity=".65"/>
    </g>

    <g filter="url(#smallShadow)">
      <ellipse cx="1372" cy="660" rx="108" ry="88" fill="#dfe7ee"/>
      <ellipse cx="1372" cy="660" rx="90" ry="70" fill="url(#sambar)"/>
      <circle cx="1335" cy="650" r="14" fill="#d79f4a"/>
      <circle cx="1370" cy="632" r="12" fill="#cf7e26"/>
      <circle cx="1406" cy="652" r="10" fill="#e1b15d"/>
      <path d="M1328 682 Q1374 700 1422 678" fill="none" stroke="#f5c97d" stroke-width="7" stroke-linecap="round" opacity=".55"/>
    </g>
  </g>

  <g opacity=".14">
    <path d="M339 716 Q410 663 505 657" fill="none" stroke="#5e7c3d" stroke-width="28" stroke-linecap="round"/>
    <path d="M1146 856 Q1224 824 1328 832" fill="none" stroke="#5e7c3d" stroke-width="26" stroke-linecap="round"/>
  </g>

  <g transform="translate(120 102)">
    <text x="0" y="0" font-family="Georgia, Times New Roman, serif" font-size="54" font-weight="700" fill="#5e3418">Paper Roast Dosa</text>
    <text x="0" y="52" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="#7c5e3d">Cone roast with coconut chutney, tomato chutney, and sambar</text>
  </g>
</svg>
