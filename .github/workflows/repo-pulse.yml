name: repo-pulse

on:
  workflow_dispatch:
  schedule:
    - cron: "30 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  pulse:
    name: Repo pulse baseline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm run pulse:check -- --write-state
      - uses: peter-evans/create-pull-request@v7
        with:
          branch: codex/repo-pulse
          commit-message: Update repo pulse baseline
          title: Update repo pulse baseline
          body: |
            Automated repo pulse update.

            This refreshes the tracked baseline for:
            - OpenAI audio/TTS docs signals
            - MDN WebGPU availability guidance
            - Context7 freshness metadata
          delete-branch: true
