name: agent-docs

on:
  pull_request:

jobs:
  check:
    name: Agent metadata docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false
      - run: node scripts/agent-lint.mjs
