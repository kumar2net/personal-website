name: retriever-determinism

on:
  pull_request:

jobs:
  test:
    name: Deterministic retrieval smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false
      - run: node scripts/retriever-determinism.mjs
