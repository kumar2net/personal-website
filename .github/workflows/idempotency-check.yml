name: idempotency-check

on:
  pull_request:

jobs:
  scan:
    name: Idempotency guard scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          package-manager-cache: false
      - run: node scripts/idempotency-guard.mjs
